name: hailo release artifacts

on:
  pull_request:
    paths:
      - 'crates/ruvector-hailo-cluster/**'
      - 'crates/ruvector-hailo/**'
      - 'crates/ruvector-mmwave/**'
      - 'crates/hailort-sys/**'
      - '.github/workflows/hailo-release-artifacts.yml'
  push:
    tags:
      - 'hailo-backend-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach artifacts to'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }} binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: ruvector-hailo-linux-x64.tar.gz
          - target: aarch64-unknown-linux-gnu
            archive: ruvector-hailo-linux-aarch64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler gcc-aarch64-linux-gnu
      - name: Build Hailo deploy binaries
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p ruvector-hailo-cluster \
            --bin ruvector-hailo-worker \
            --bin ruvector-hailo-embed \
            --bin ruvector-hailo-fakeworker \
            --bin ruvector-hailo-stats \
            --bin ruvllm-pi-worker \
            --bin ruvector-mmwave-bridge \
            --bin ruview-csi-bridge \
            --bin ruvllm-bridge
      - name: Package binaries and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ruvector-hailo-${{ matrix.target }}
          for bin in ruvector-hailo-worker ruvector-hailo-embed ruvector-hailo-fakeworker ruvector-hailo-stats ruvector-mmwave-bridge ruview-csi-bridge ruvllm-bridge ruvllm-pi-worker; do
            cp "target/${{ matrix.target }}/release/$bin" "dist/ruvector-hailo-${{ matrix.target }}/"
          done
          tar -C dist -czf "dist/${{ matrix.archive }}" "ruvector-hailo-${{ matrix.target }}"
          (cd dist && sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256")
      - name: Upload temporary build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Build combined SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS
          fail_on_unmatched_files: true
