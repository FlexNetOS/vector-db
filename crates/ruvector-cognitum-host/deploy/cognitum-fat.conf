# Cognitum Seed USB mass-storage — udisks2 mount override
#
# Without this, vfat volumes mount with `showexec` (udisks2 default), which
# restricts +x to .exe/.com/.bat. The Seed ships a Linux launcher (`launch.sh`)
# and a CA installer (`install-trust.sh`) on its mass-storage volume, both of
# which become unrunnable via double-click and trigger the GNOME autorun's
# "program is not marked as executable" dialog.
#
# This override matches by partition label COGNITUM (unique to the Seed
# USB-gadget) and drops `showexec` so .sh files are executable.
#
# Installed at: /etc/udisks2/mount_options.conf.d/cognitum-fat.conf
# Source of truth: crates/ruvector-cognitum-host/deploy/cognitum-fat.conf

[/dev/disk/by-label/COGNITUM]
vfat_defaults=uid=$UID,gid=$GID,fmask=0022,dmask=0022,shortname=mixed,utf8=1,flush
