[package]
name = "cognitum-one"
version = "0.2.1"
edition = "2021"
description = "Official Cognitum SDK for Rust"
license = "MIT"
readme = "README.md"
keywords = ["cognitum", "ai", "mcp", "sdk", "seed"]
categories = ["api-bindings", "web-programming::http-client"]
repository = "https://github.com/cognitum-one/sdks"
homepage = "https://cognitum.one"
documentation = "https://docs.rs/cognitum-one"
include = [
    "src/**/*",
    "benches/**/*",
    "tests/**/*",
    "docs/**/*",
    "Cargo.toml",
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
]

[features]
default = ["rustls"]
rustls = ["reqwest/rustls-tls"]
native-tls = ["reqwest/native-tls"]
seed = ["dep:url"]
stream = ["seed", "dep:eventsource-stream"]
blocking = ["reqwest/blocking"]
live-seed-tests = ["seed"]
# Opt-in mDNS discovery (ADR-0016a Â§D6, Phase 3). One-shot `_cognitum._tcp.local`
# query; parses TXT records into `DiscoveredPeer`. Pulls in `mdns-sd` which
# uses `flume` + `socket2` but NO async runtime of its own, so it can run
# from a `tokio::task::spawn_blocking` context.
mdns = ["seed", "dep:mdns-sd"]

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
# `process` + `io-util` are required for the MCP stdio transport
# (OQ-4, src/mcp/stdio.rs): we spawn the MCP server as a tokio subprocess
# and frame JSON over its stdin/stdout with BufReader::read_line.
# `time` / `macros` predate the stdio work and are still used by the
# seed client's retry loop and the #[tokio::test] macro.
tokio = { version = "1", features = ["time", "macros", "process", "io-util"] }
url = { version = "2", optional = true }
eventsource-stream = { version = "0.2", optional = true }
# `async-trait` backs both the `Discovery` trait (Â§D6, seed feature) and the
# `Transport` trait that powers the MCP client surface (src/mcp/transport.rs).
# Pulled in unconditionally as of 2026-04-23 so the cloud-only default build
# can expose `mcp::Transport` without forcing callers to turn on `seed`.
async-trait = "0.1"
# Phase 3 mDNS discovery (ADR-0016a Â§D6). `default-features = false` drops
# the optional `async`/`log` integrations â€” we drive mdns-sd's sync receiver
# from `tokio::task::spawn_blocking` ourselves.
mdns-sd = { version = "0.19", optional = true, default-features = false }
# Per-peer `fp=` cert fingerprint pinning for the seed rustls handshake
# (ADR-0014c Â§"fp= cert pinning", ADR-0007 Â§TLS). `sha2` computes the
# SHA-256 digest of the presented end-entity cert; `rustls` and
# `webpki-roots` are already pulled transitively by reqwest's
# `rustls-tls` feature, we surface them here so our custom
# `ServerCertVerifier` sees the same rustls 0.23 types reqwest does.
sha2 = { version = "0.10", default-features = false }
rustls = { version = "0.23", default-features = false }
webpki-roots = "1.0"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
wiremock = "0.6"
rcgen = "0.13"
